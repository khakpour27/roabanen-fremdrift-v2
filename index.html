<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Røabanen Fremdrift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #fff;
    color: #1B3A5C;
    padding: 36px 40px;
  }
  .header { margin-bottom: 12px; max-width: 1060px; margin-left: auto; margin-right: auto; margin-bottom: 12px; }
  .header h1 { font-size: 30px; font-weight: 700; color: #1B3A5C; }
  .header .subtitle { font-size: 15px; color: #5A6F85; margin-top: 2px; }

  /* Filters bar */
  .filters {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
    max-width: 1060px;
    margin-left: auto;
    margin-right: auto;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-group label {
    font-size: 13px;
    font-weight: 600;
    color: #1B3A5C;
  }
  .filter-group select {
    font-family: inherit;
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid #C0C8D4;
    border-radius: 4px;
    background: #fff;
    color: #1B3A5C;
    cursor: pointer;
    min-width: 170px;
  }
  .filter-group select:focus {
    outline: none;
    border-color: #3B7DD8;
    box-shadow: 0 0 0 2px rgba(59,125,216,0.15);
  }
  .filter-reset {
    font-family: inherit;
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid #C0C8D4;
    border-radius: 4px;
    background: #F6F8FB;
    color: #5A6F85;
    cursor: pointer;
  }
  .filter-reset:hover { background: #E8ECF1; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { max-width: 1060px; border-collapse: collapse; width: 100%; margin: 0 auto; }

  thead th {
    background: #1B3A5C;
    color: #fff;
    font-weight: 600;
    text-align: center;
    vertical-align: middle;
    border: 1px solid #15304D;
    white-space: nowrap;
  }
  thead th.phase-header { font-size: 14px; padding: 12px 4px; letter-spacing: 0.3px; }
  thead th.time-header { font-size: 12.5px; padding: 8px 4px; background: #24476A; font-weight: 500; }
  thead th.label-header {
    text-align: left;
    padding: 10px 14px;
    font-size: 15px;
    vertical-align: bottom;
  }
  thead th.brudd-phase { background: #6B1A15; }
  thead th.brudd-time { background: #7D2922; font-weight: 500; }

  tbody td {
    border: 1px solid #E4E8ED;
    padding: 0;
    vertical-align: top;
    position: relative;
  }
  tbody tr:nth-child(odd) td { background: #F6F8FB; }
  tbody tr:nth-child(even) td { background: #fff; }
  tbody tr.hidden { display: none; }

  tbody td.label-cell {
    padding: 8px 14px;
    font-size: 15px;
    font-weight: 600;
    color: #1B3A5C;
    line-height: 1.3;
    border-right: 2px solid #D0D7E0;
    white-space: nowrap;
  }
  tbody td.label-cell .km {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: #7A8DA0;
    margin-top: 2px;
  }

  .bar {
    border-radius: 3px;
    padding: 4px 6px;
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    line-height: 1.3;
    word-break: break-word;
    hyphens: auto;
    transition: opacity 0.15s;
  }
  .bar.dimmed { opacity: 0.15; }
  .bars {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 5px 4px;
  }
  .bar.light-bg { color: #1B3A5C; }

  .brudd-col { background: rgba(180, 40, 30, 0.04) !important; }

  /* Legend */
  .legend { display: flex; gap: 20px; margin-top: 18px; flex-wrap: wrap; align-items: center; max-width: 1060px; margin-left: auto; margin-right: auto; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 14px; color: #2C4A63; }
  .legend-swatch { width: 20px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-divider { width: 1px; height: 18px; background: #D0D7E0; }

  .brudd-tag {
    display: inline-block;
    background: #C83228;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    vertical-align: middle;
  }

  .note { margin-top: 16px; font-size: 13px; color: #7A8DA0; line-height: 1.6; max-width: 1060px; margin-left: auto; margin-right: auto; }

  /* Responsive */
  @media (max-width: 800px) {
    body { padding: 16px; }
    .header h1 { font-size: 22px; }
    .header .subtitle { font-size: 13px; }
    thead th.phase-header { font-size: 12px; padding: 8px 2px; }
    thead th.time-header { font-size: 10.5px; padding: 6px 2px; }
    thead th.label-header { font-size: 13px; padding: 8px 10px; }
    tbody td.label-cell { font-size: 13px; padding: 6px 10px; }
    tbody td.label-cell .km { font-size: 10.5px; }
    .bar { font-size: 9.5px; padding: 3px 4px; }
    .bars { padding: 3px 2px; gap: 2px; }
    .legend-item { font-size: 12px; }
    .legend { gap: 12px; }
    .filters { gap: 10px; }
    .filter-group select { min-width: 140px; font-size: 12px; }
  }

  @media (max-width: 550px) {
    thead th.time-header { font-size: 9px; padding: 4px 1px; }
    tbody td.label-cell { font-size: 12px; padding: 5px 8px; white-space: normal; }
    .bar { font-size: 8.5px; padding: 2px 3px; }
  }

  @media print {
    body { padding: 16px; }
    .filters { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Røabanen Fremdrift</h1>
  <div class="subtitle">Rådgiveroppdrag prosjektering &mdash; Oppgradering av Røabanen</div>
</div>

<div class="filters">
  <div class="filter-group">
    <label for="f-section">Strekning:</label>
    <select id="f-section"><option value="all">Alle strekninger</option></select>
  </div>
  <div class="filter-group">
    <label for="f-worktype">Arbeidstype:</label>
    <select id="f-worktype"><option value="all">Alle typer</option></select>
  </div>
  <div class="filter-group">
    <label for="f-period">Periode:</label>
    <select id="f-period">
      <option value="all">Hele perioden</option>
      <option value="prep">Forberedende (apr–jun)</option>
      <option value="brudd">Sommerbrudd (jul–aug)</option>
    </select>
  </div>
  <button class="filter-reset" onclick="resetFilters()">Nullstill</button>
</div>

<div class="table-wrap">
  <div id="chart"></div>
</div>
<div class="legend" id="legend"></div>
<div class="note" id="note"></div>

<script>
const SECTIONS = [
  { name: 'Borgen - Smestad',        km: 'km 2,8 – 4,0' },
  { name: 'Smestad - Sørbyhaugen',   km: 'km 4,0 – 4,5' },
  { name: 'Smestad - Makrellbekken', km: 'km 4,0 – 4,9' },
  { name: 'Makrellbekken - Holmen',  km: 'km 4,9 – 5,4' },
  { name: 'Holmen - Hovseter',       km: 'km 5,4 – 6,1' },
  { name: 'Hovseter - Røa',          km: 'km 6,0 – 6,8' },
  { name: 'Røa - Ekraveien',         km: 'km 6,8 – 7,5' },
  { name: 'Ekraveien - Eiksmarka',   km: 'km 7,5 – 8,4' },
];

const WT = {
  spor:         { label: 'Sporarbeid',              color: '#1B3A5C', lightBg: false },
  veksel:       { label: 'Sporveksler',             color: '#2D5F8A', lightBg: false },
  elektro:      { label: 'Elektro / kabel',         color: '#3B7DD8', lightBg: false },
  bru:          { label: 'Bru-rehabilitering',      color: '#6A9FD1', lightBg: true },
  konstruksjon: { label: 'Konstruksjon / drenering', color: '#A8C4E0', lightBg: true },
  tunnel:       { label: 'Tunnel',                  color: '#4A8AC2', lightBg: false },
  sikring:      { label: 'Gjerde / sikring',        color: '#8BB4D9', lightBg: true },
};

const COLS = [
  { id: 'apr',  label: 'Apr',     brudd: false, period: 'prep' },
  { id: 'mai',  label: 'Mai',     brudd: false, period: 'prep' },
  { id: 'jun',  label: 'Jun',     brudd: false, period: 'prep' },
  { id: 'w1',   label: '3.–9. jul',       brudd: true, period: 'brudd' },
  { id: 'w2',   label: '10.–16. jul',     brudd: true, period: 'brudd' },
  { id: 'w3',   label: '17.–23. jul',     brudd: true, period: 'brudd' },
  { id: 'w4',   label: '24.–30. jul',     brudd: true, period: 'brudd' },
  { id: 'w5',   label: '31. jul–6. aug',  brudd: true, period: 'brudd' },
  { id: 'w6',   label: '7.–13. aug',      brudd: true, period: 'brudd' },
];

const DATA = [
  [0, 'w1', 'sikring',   'Fundamenttiltak gjerdestolper'],
  [0, 'w1', 'elektro',   'Jordledning nedgraving i ballast'],
  [0, 'w2', 'elektro',   'Jordledning i kanal'],
  [0, 'w3', 'elektro',   'Jordledning i kanal'],
  [0, 'w4', 'elektro',   'Jordledning i kanal'],
  [0, 'w5', 'elektro',   'Jordledning i kanal'],
  [1, 'apr', 'konstruksjon', 'Straks tiltak skjæring/mur/drenering'],
  [1, 'mai', 'konstruksjon', 'Permanente tiltak skjæring/mur'],
  [1, 'jun', 'konstruksjon', 'Permanente tiltak skjæring/mur'],
  [1, 'w1', 'spor',       'Demontering sporkonstruksjon'],
  [1, 'w2', 'konstruksjon','Tiltak skjæring/mur/drenering'],
  [1, 'w3', 'konstruksjon','Utbedring over-/underbygning'],
  [1, 'w4', 'spor',       'Innlegging ballastmatter'],
  [2, 'w1', 'konstruksjon', 'Masseutskifting Makrellbekken stasjon'],
  [2, 'w3', 'spor',       'Utskiftning ballastpukk'],
  [2, 'w4', 'spor',       'Ny ballastpukk / sporkonstruksjon'],
  [2, 'w4', 'veksel',     'Sporveksler R0446/R0448'],
  [2, 'w5', 'spor',       'Etablere sporkonstruksjon'],
  [2, 'w5', 'elektro',    'Ny ALU-strømskinne'],
  [3, 'w1', 'elektro',    'Kabelkanaler og kabeltiltak'],
  [3, 'w2', 'elektro',    'Ny ALU-strømskinne'],
  [3, 'w3', 'elektro',    'Ny ALU-strømskinne'],
  [4, 'w2', 'elektro',    'Kabelkanaler og kabeltiltak'],
  [5, 'apr', 'bru',       'Rehab bru Sørkedalsveien / Ostedalsveien'],
  [5, 'apr', 'sikring',   'Kjøresikkert gjerde Røatunnelen'],
  [5, 'w1', 'veksel',     'Masseutskiftning + utskifting sporveksler'],
  [5, 'w1', 'tunnel',     'Tiltak tunnel Røa stasjon'],
  [5, 'w2', 'veksel',     'Utskifting sporveksler R0620/R0633'],
  [5, 'w2', 'elektro',    'Sporvekselvarmeanlegg + lys'],
  [5, 'w3', 'elektro',    'Kabelkanaler og kabeltiltak'],
  [6, 'apr', 'spor',      'Utkjøring skinner NSB40 til 49E1'],
  [6, 'w1', 'spor',       'Utskiftning spor NSB40 til 49E1'],
  [6, 'w1', 'sikring',    'Tiltak støyskjerm Grinidammen'],
  [6, 'w2', 'tunnel',     'Rehabilitering tunnel Røa stasjon'],
  [6, 'w3', 'tunnel',     'Rehabilitering tunnel Røa stasjon'],
  [6, 'w4', 'tunnel',     'Rehabilitering tunnel Røa stasjon'],
  [7, 'apr', 'bru',       'Rehab bru Grinidammen / Vollsveien'],
  [7, 'w1', 'veksel',     'Masseutskiftning + utskifting sporveksler'],
  [7, 'w2', 'veksel',     'Utskifting sporveksler R0806/R0817'],
  [7, 'w2', 'elektro',    'Sporvekselvarmeanlegg + styreskap + lys'],
];

// Populate filter dropdowns
function initFilters() {
  const fSec = document.getElementById('f-section');
  SECTIONS.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.name;
    fSec.appendChild(opt);
  });

  const fWt = document.getElementById('f-worktype');
  for (const [k, v] of Object.entries(WT)) {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = v.label;
    fWt.appendChild(opt);
  }

  document.getElementById('f-section').addEventListener('change', applyFilters);
  document.getElementById('f-worktype').addEventListener('change', applyFilters);
  document.getElementById('f-period').addEventListener('change', applyFilters);

  // Apply URL parameters
  const params = new URLSearchParams(window.location.search);
  if (params.has('section')) {
    document.getElementById('f-section').value = params.get('section');
  }
  if (params.has('type')) {
    document.getElementById('f-worktype').value = params.get('type');
  }
  if (params.has('period')) {
    document.getElementById('f-period').value = params.get('period');
  }
  applyFilters();
}

function resetFilters() {
  document.getElementById('f-section').value = 'all';
  document.getElementById('f-worktype').value = 'all';
  document.getElementById('f-period').value = 'all';
  applyFilters();
}

function applyFilters() {
  const secVal = document.getElementById('f-section').value;
  const wtVal = document.getElementById('f-worktype').value;
  const perVal = document.getElementById('f-period').value;

  // Show/hide rows
  const rows = document.querySelectorAll('tbody tr');
  rows.forEach((row, i) => {
    if (secVal === 'all' || parseInt(secVal) === i) {
      row.classList.remove('hidden');
    } else {
      row.classList.add('hidden');
    }
  });

  // Dim/show bars based on work type
  const bars = document.querySelectorAll('.bar');
  bars.forEach(bar => {
    const wt = bar.dataset.wt;
    if (wtVal === 'all' || wt === wtVal) {
      bar.classList.remove('dimmed');
    } else {
      bar.classList.add('dimmed');
    }
  });

  // Show/hide period columns
  const prepCols = document.querySelectorAll('[data-period="prep"]');
  const bruddCols = document.querySelectorAll('[data-period="brudd"]');
  const prepHeaders = document.querySelectorAll('.prep-phase-header');
  const bruddHeaders = document.querySelectorAll('.brudd-phase-header');

  if (perVal === 'prep') {
    bruddCols.forEach(el => el.style.display = 'none');
    prepCols.forEach(el => el.style.display = '');
    bruddHeaders.forEach(el => el.style.display = 'none');
    prepHeaders.forEach(el => el.style.display = '');
  } else if (perVal === 'brudd') {
    prepCols.forEach(el => el.style.display = 'none');
    bruddCols.forEach(el => el.style.display = '');
    prepHeaders.forEach(el => el.style.display = 'none');
    bruddHeaders.forEach(el => el.style.display = '');
  } else {
    prepCols.forEach(el => el.style.display = '');
    bruddCols.forEach(el => el.style.display = '');
    prepHeaders.forEach(el => el.style.display = '');
    bruddHeaders.forEach(el => el.style.display = '');
  }
}

function render() {
  const el = document.getElementById('chart');
  let h = '<table>';

  // Thead: phase row
  h += '<thead>';
  h += '<tr>';
  h += '<th class="label-header" rowspan="2">Strekning</th>';
  h += '<th class="phase-header prep-phase-header" colspan="3">Forberedende</th>';
  h += '<th class="phase-header brudd-phase brudd-phase-header" colspan="6"><span class="brudd-tag">BRUDD</span> &nbsp;Sommerbrudd 3. jul – 13. aug 2028</th>';
  h += '</tr>';

  // Thead: time columns row
  h += '<tr>';
  COLS.forEach(c => {
    const cls = c.brudd ? 'time-header brudd-time' : 'time-header';
    const pCls = c.brudd ? 'brudd-phase-header' : 'prep-phase-header';
    h += `<th class="${cls} ${pCls}" data-period="${c.period}">${c.label}</th>`;
  });
  h += '</tr></thead>';

  // Tbody
  h += '<tbody>';
  SECTIONS.forEach((sec, si) => {
    h += `<tr data-section="${si}">`;
    h += `<td class="label-cell">${sec.name}<span class="km">${sec.km}</span></td>`;

    COLS.forEach(col => {
      const acts = DATA.filter(d => d[0] === si && d[1] === col.id);
      const bruddCls = col.brudd ? ' brudd-col' : '';
      const pCls = col.brudd ? 'brudd-phase-header' : 'prep-phase-header';

      if (acts.length === 0) {
        h += `<td class="${bruddCls} ${pCls}" data-period="${col.period}"></td>`;
      } else {
        h += `<td class="${bruddCls} ${pCls}" data-period="${col.period}"><div class="bars">`;
        acts.forEach(a => {
          const wt = WT[a[2]];
          const txtCls = wt.lightBg ? ' light-bg' : '';
          h += `<div class="bar${txtCls}" style="background:${wt.color}" title="${a[3]}" data-wt="${a[2]}">${a[3]}</div>`;
        });
        h += '</div></td>';
      }
    });
    h += '</tr>';
  });
  h += '</tbody></table>';

  el.innerHTML = h;

  // Legend
  const legend = document.getElementById('legend');
  let lg = '';
  for (const [k, v] of Object.entries(WT)) {
    lg += `<div class="legend-item"><div class="legend-swatch" style="background:${v.color}"></div>${v.label}</div>`;
  }
  lg += '<div class="legend-divider"></div>';
  lg += `<div class="legend-item"><span class="brudd-tag">BRUDD</span> Full stans i trafikk</div>`;
  legend.innerHTML = lg;

  // Note
  document.getElementById('note').innerHTML =
    'Befaringer gjennomføres april 2026 for alle strekninger. ' +
    'Forberedende arbeid (apr–jun 2028) utføres uten full stans. ' +
    'Sommerbrudd med full trafikkstans: 3. juli – 13. august 2028.';
}

render();
initFilters();
</script>
</body>
</html>
