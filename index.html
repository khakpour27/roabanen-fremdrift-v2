<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Røabanen Fremdrift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #D2EAF7;
    color: #1C2B54;
    padding: 0;
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }
  .page-content {
    flex: 1;
    padding: 36px 40px;
  }
  /* COWI brand bar */
  .cowi-bar {
    background: #1C2B54;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 0 0 0;
  }
  .cowi-logo {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .cowi-logo svg { height: 56px; width: auto; }
  .cowi-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-style: italic;
    letter-spacing: 0.2px;
  }
  .header { margin-bottom: 12px; max-width: 1380px; margin-left: auto; margin-right: auto; }
  .header h1 { font-size: 36px; font-weight: 700; color: #1C2B54; }
  .header .subtitle { font-size: 18px; color: #5A6F85; margin-top: 3px; }

  /* Filters bar */
  .filters {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
    max-width: 1380px;
    margin-left: auto;
    margin-right: auto;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-group label {
    font-size: 15px;
    font-weight: 600;
    color: #1C2B54;
  }
  .filter-group select {
    font-family: inherit;
    font-size: 15px;
    padding: 6px 12px;
    border: 1px solid #C0C8D4;
    border-radius: 4px;
    background: #fff;
    color: #1C2B54;
    cursor: pointer;
    min-width: 170px;
  }
  .filter-group select:focus {
    outline: none;
    border-color: #3B7DD8;
    box-shadow: 0 0 0 2px rgba(59,125,216,0.15);
  }
  .filter-reset {
    font-family: inherit;
    font-size: 14px;
    padding: 6px 14px;
    border: 1px solid #C0C8D4;
    border-radius: 4px;
    background: #F6F8FB;
    color: #5A6F85;
    cursor: pointer;
  }
  .filter-reset:hover { background: #E8ECF1; }

  /* Table */
  .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); max-width: 1380px; margin: 0 auto; }
  table { border-collapse: collapse; width: 100%; }

  thead th {
    background: #1C2B54;
    color: #fff;
    font-weight: 600;
    text-align: center;
    vertical-align: middle;
    border: 1px solid #141F3D;
    white-space: nowrap;
  }
  thead th.phase-header { font-size: 16px; padding: 14px 5px; letter-spacing: 0.3px; }
  thead th.time-header { font-size: 14px; padding: 10px 4px; background: #263660; font-weight: 500; }
  thead th.label-header {
    text-align: left;
    padding: 12px 16px;
    font-size: 18px;
    vertical-align: bottom;
  }
  thead th.brudd-phase { background: #612141; }
  thead th.brudd-time { background: #7A3050; font-weight: 500; }

  tbody td {
    border: 1px solid #E4E8ED;
    padding: 0;
    vertical-align: top;
    position: relative;
  }
  tbody tr:nth-child(odd) td { background: #F6F8FB; }
  tbody tr:nth-child(even) td { background: #fff; }
  tbody tr.hidden { display: none; }

  tbody td.label-cell {
    padding: 10px 16px;
    font-size: 18px;
    font-weight: 600;
    color: #1C2B54;
    line-height: 1.3;
    border-right: 2px solid #D0D7E0;
    white-space: nowrap;
  }
  tbody td.label-cell .km {
    display: block;
    font-size: 14px;
    font-weight: 400;
    color: #7A8DA0;
    margin-top: 2px;
  }

  .bar {
    border-radius: 4px;
    padding: 5px 7px;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    line-height: 1.3;
    word-break: break-word;
    hyphens: auto;
    transition: opacity 0.15s;
  }
  .bar.dimmed { opacity: 0.15; }
  .bars {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 6px 5px;
  }
  .bar.light-bg { color: #1C2B54; }

  .brudd-col { background: rgba(180, 40, 30, 0.04) !important; }
  .mar-col { background: rgba(210, 234, 247, 0.35) !important; }

  /* Connected spanning bars */
  .bar.span-start { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .bar.span-mid   { border-radius: 0; opacity: 0.38; }
  .bar.span-end   { border-top-left-radius: 0; border-bottom-left-radius: 0; opacity: 0.38; }
  .span-underbar {
    height: 5px;
    border-radius: 0;
    opacity: 1;
    margin-top: 2px;
  }
  .span-underbar.span-ub-start { border-radius: 4px 0 0 4px; }
  .span-underbar.span-ub-end   { border-radius: 0 4px 4px 0; }
  .span-underbar.span-ub-solo  { border-radius: 4px; }
  td.span-bridge-r { border-right-color: transparent !important; }
  td.span-bridge-l { border-left-color: transparent !important; }
  .bars.flush-r { padding-right: 0; }
  .bars.flush-l { padding-left: 0; }

  /* Legend */
  .legend { display: flex; gap: 20px; margin-top: 18px; flex-wrap: wrap; align-items: center; max-width: 1380px; margin-left: auto; margin-right: auto; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 16px; color: #2C4A63; }
  .legend-swatch { width: 24px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .legend-divider { width: 1px; height: 18px; background: #D0D7E0; }

  .brudd-tag {
    display: inline-block;
    background: #F04E23;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    vertical-align: middle;
  }

  .note { margin-top: 18px; font-size: 15px; color: #4A6A82; line-height: 1.6; max-width: 1380px; margin-left: auto; margin-right: auto; padding-bottom: 10px; }

  /* Footer */
  .footer {
    background: #1C2B54;
    padding: 14px 40px;
    text-align: center;
  }
  .footer-inner {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.3px;
  }

  /* Responsive */
  @media (max-width: 800px) {
    .page-content { padding: 16px; }
    .header h1 { font-size: 22px; }
    .header .subtitle { font-size: 13px; }
    thead th.phase-header { font-size: 12px; padding: 8px 2px; }
    thead th.time-header { font-size: 10.5px; padding: 6px 2px; }
    thead th.label-header { font-size: 13px; padding: 8px 10px; }
    tbody td.label-cell { font-size: 13px; padding: 6px 10px; }
    tbody td.label-cell .km { font-size: 10.5px; }
    .bar { font-size: 9.5px; padding: 3px 4px; }
    .bars { padding: 3px 2px; gap: 2px; }
    .legend-item { font-size: 12px; }
    .legend { gap: 12px; }
    .filters { gap: 10px; }
    .filter-group select { min-width: 140px; font-size: 12px; }
  }

  @media (max-width: 550px) {
    thead th.time-header { font-size: 9px; padding: 4px 1px; }
    tbody td.label-cell { font-size: 12px; padding: 5px 8px; white-space: normal; }
    .bar { font-size: 8.5px; padding: 2px 3px; }
  }

  /* Embed mode: hide chrome when URL has section/type/period params */
  body.embed .cowi-bar { display: none; }
  body.embed .header { display: none; }
  body.embed .filters { display: none; }
  body.embed .footer { display: none; }
  body.embed .note { display: none; }
  body.embed .page-content { padding: 18px 20px; }

  @media print {
    .page-content { padding: 16px; }
    .filters { display: none; }
    .footer { display: none; }
    body { background: #fff; }
  }
</style>
</head>
<body>

  <a class="cowi-logo" href="https://www.cowi.com" target="_blank" rel="noopener">

  </a>
  <div class="cowi-tagline">Together, we shape a sustainable and liveable world</div>
</div>

<div class="page-content">
<div class="header">
  <h1>Røabanen Fremdrift</h1>
  <div class="subtitle">Rådgiveroppdrag prosjektering &mdash; Oppgradering av Røabanen</div>
</div>

<div class="filters">
  <div class="filter-group">
    <label for="f-section">Strekning:</label>
    <select id="f-section"><option value="all">Alle strekninger</option></select>
  </div>
  <div class="filter-group">
    <label for="f-worktype">Arbeidstype:</label>
    <select id="f-worktype"><option value="all">Alle typer</option></select>
  </div>
  <div class="filter-group">
    <label for="f-period">Periode:</label>
    <select id="f-period">
      <option value="all">Hele perioden</option>
      <option value="prep">Forberedende (apr–jun)</option>
      <option value="brudd">Stengt spor (jul–aug)</option>
    </select>
  </div>
  <button class="filter-reset" onclick="resetFilters()">Nullstill</button>
</div>

<div class="table-wrap">
  <div id="chart"></div>
</div>
<div class="legend" id="legend"></div>
<div class="note" id="note"></div>
</div><!-- end page-content -->

<div class="footer">
  <div class="footer-inner">COWI &mdash; Together, we shape a sustainable and liveable world</div>
</div>

<script>
const SECTIONS = [
  { name: 'Borgen – Smestad',        km: 'km 2,8 – 4,0' },
  { name: 'Smestad – Sørbyhaugen',   km: 'km 4,0 – 4,5' },
  { name: 'Smestad – Makrellbekken', km: 'km 4,0 – 4,9' },
  { name: 'Makrellbekken – Holmen',  km: 'km 4,9 – 5,4' },
  { name: 'Holmen – Hovseter',       km: 'km 5,4 – 6,1' },
  { name: 'Hovseter – Røa',          km: 'km 6,0 – 6,8' },
  { name: 'Røa – Ekraveien',         km: 'km 6,8 – 7,5' },
  { name: 'Ekraveien – Eiksmarka',   km: 'km 7,5 – 8,4' },
  { name: 'Borgen – Eiksmarka',      km: 'km 2,8 – 8,5' },
];

// Render order: hele strekning (8) first, then 0-7
const RENDER_ORDER = [8, 0, 1, 2, 3, 4, 5, 6, 7];

const WT = {
  spor:         { label: 'Sporarbeid',              color: '#1C2B54', lightBg: false },
  veksel:       { label: 'Sporveksler',             color: '#612141', lightBg: false },
  elektro:      { label: 'Elektro / kabel',         color: '#31B18F', lightBg: false },
  bru:          { label: 'Bru-rehabilitering',      color: '#B85042', lightBg: false },
  konstruksjon: { label: 'Konstruksjon / drenering', color: '#EFE1D6', lightBg: true },
  tunnel:       { label: 'Tunnel',                  color: '#3B6E9F', lightBg: false },
  sikring:      { label: 'Gjerde / sikring',        color: '#D5F0E9', lightBg: true },
};

const COLS = [
  { id: 'mar',  label: '',        brudd: false, period: 'prep', mar: true },
  { id: 'apr',  label: 'Apr',     brudd: false, period: 'prep' },
  { id: 'mai',  label: 'Mai',     brudd: false, period: 'prep' },
  { id: 'jun',  label: 'Jun',     brudd: false, period: 'prep' },
  { id: 'w1',   label: '3.–9. jul',       brudd: true, period: 'brudd' },
  { id: 'w2',   label: '10.–16. jul',     brudd: true, period: 'brudd' },
  { id: 'w3',   label: '17.–23. jul',     brudd: true, period: 'brudd' },
  { id: 'w4',   label: '24.–30. jul',     brudd: true, period: 'brudd' },
  { id: 'w5',   label: '31. jul–6. aug',  brudd: true, period: 'brudd' },
  { id: 'w6',   label: '7.–13. aug',      brudd: true, period: 'brudd' },
];
const COL_IDS = COLS.map(c => c.id);

const DATA = [
  // 0 = Borgen – Smestad
  [0, 'w1', 'sikring',   'Fundamenttiltak gjerdestolper'],
  // 1 = Smestad – Sørbyhaugen
  [1, 'mar', 'konstruksjon', 'Straks tiltak skjæring/mur/drenering'],
  [1, 'apr', 'konstruksjon', 'Straks tiltak skjæring/mur/drenering'],
  [1, 'mai', 'konstruksjon', 'Permanente tiltak skjæring/mur'],
  [1, 'jun', 'konstruksjon', 'Permanente tiltak skjæring/mur'],
  [1, 'w1', 'spor',       'Demontering sporkonstruksjon'],
  [1, 'w2', 'konstruksjon','Tiltak skjæring/mur/drenering'],
  [1, 'w3', 'konstruksjon','Utbedring over-/underbygning'],
  [1, 'w4', 'spor',       'Innlegging ballastmatter'],
  // 2 = Smestad – Makrellbekken
  [2, 'w1', 'konstruksjon', 'Masseutskifting Makrellbekken stasjon'],
  [2, 'w3', 'spor',       'Utskiftning ballastpukk'],
  [2, 'w4', 'spor',       'Ny ballastpukk / sporkonstruksjon'],
  [2, 'w4', 'veksel',     'Sporveksler R0446/R0448'],
  [2, 'w5', 'spor',       'Etablere sporkonstruksjon'],
  [2, 'w5', 'elektro',    'Ny ALU-strømskinne'],
  // 3 = Makrellbekken – Holmen
  [3, 'w1', 'elektro',    'Kabelkanaler og kabeltiltak'],
  [3, 'w2', 'elektro',    'Ny ALU-strømskinne'],
  [3, 'w3', 'elektro',    'Ny ALU-strømskinne'],
  // 4 = Holmen – Hovseter
  [4, 'w2', 'elektro',    'Kabelkanaler og kabeltiltak'],
  // 5 = Hovseter – Røa
  [5, 'apr', 'bru',       'Rehab bru Sørkedalsveien og Ostedalsveien'],
  [5, 'apr', 'sikring',   'Kjøresikkert gjerde Røatunnelen'],
  [5, 'w1', 'veksel',     'Masseutskiftning + utskifting sporveksler'],
  [5, 'w1', 'tunnel',     'Tiltak tunnel Røa stasjon'],
  [5, 'w2', 'veksel',     'Utskifting sporveksler R0620/R0633'],
  [5, 'w2', 'elektro',    'Sporvekselvarmeanlegg + lys'],
  [5, 'w3', 'elektro',    'Kabelkanaler og kabeltiltak'],
  // 6 = Røa – Ekraveien
  [6, 'apr', 'spor',      'Utkjøring skinner NSB40 til 49E1'],
  [6, 'w1', 'spor',       'Utskiftning spor NSB40 til 49E1'],
  [6, 'w1', 'sikring',    'Tiltak støyskjerm Grinidammen'],
  [6, 'w2', 'tunnel',     'Rehabilitering tunnel Røa stasjon'],
  [6, 'w3', 'tunnel',     'Rehabilitering tunnel Røa stasjon'],
  [6, 'w4', 'tunnel',     'Rehabilitering tunnel Røa stasjon'],
  // 7 = Ekraveien – Eiksmarka
  [7, 'apr', 'bru',       'Rehab bru Grinidammen og Vollsveien'],
  [7, 'w1', 'veksel',     'Masseutskiftning + utskifting sporveksler'],
  [7, 'w2', 'veksel',     'Utskifting sporveksler R0806/R0817'],
  [7, 'w2', 'elektro',    'Sporvekselvarmeanlegg + styreskap + lys'],
  // 8 = Borgen – Eiksmarka (hele strekningen)
  [8, 'w1', 'elektro',   'Jordledning i kanal og nedgraving i ballast'],
  [8, 'w2', 'elektro',   'Jordledning i kanal og nedgraving i ballast'],
  [8, 'w3', 'elektro',   'Jordledning i kanal og nedgraving i ballast'],
  [8, 'w4', 'elektro',   'Jordledning i kanal og nedgraving i ballast'],
  [8, 'w5', 'elektro',   'Jordledning i kanal og nedgraving i ballast'],
];

// Detect whether a bar connects to its neighbours
function spanPos(si, colId, wt, label) {
  const ci = COL_IDS.indexOf(colId);
  const prev = ci > 0 && DATA.some(d => d[0]===si && d[1]===COL_IDS[ci-1] && d[2]===wt && d[3]===label);
  const next = ci < COL_IDS.length-1 && DATA.some(d => d[0]===si && d[1]===COL_IDS[ci+1] && d[2]===wt && d[3]===label);
  if (prev && next) return 'mid';
  if (next) return 'start';
  if (prev) return 'end';
  return '';
}

// Populate filter dropdowns
function initFilters() {
  const fSec = document.getElementById('f-section');
  SECTIONS.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.name;
    fSec.appendChild(opt);
  });

  const fWt = document.getElementById('f-worktype');
  for (const [k, v] of Object.entries(WT)) {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = v.label;
    fWt.appendChild(opt);
  }

  document.getElementById('f-section').addEventListener('change', applyFilters);
  document.getElementById('f-worktype').addEventListener('change', applyFilters);
  document.getElementById('f-period').addEventListener('change', applyFilters);

  // Apply URL parameters
  const params = new URLSearchParams(window.location.search);
  const isEmbed = params.has('section') || params.has('type') || params.has('period');
  if (isEmbed) {
    document.body.classList.add('embed');
  }
  if (params.has('section')) {
    document.getElementById('f-section').value = params.get('section');
  }
  if (params.has('type')) {
    document.getElementById('f-worktype').value = params.get('type');
  }
  if (params.has('period')) {
    document.getElementById('f-period').value = params.get('period');
  }
  applyFilters();
}

function resetFilters() {
  document.getElementById('f-section').value = 'all';
  document.getElementById('f-worktype').value = 'all';
  document.getElementById('f-period').value = 'all';
  applyFilters();
}

function applyFilters() {
  const secVal = document.getElementById('f-section').value;
  const wtVal = document.getElementById('f-worktype').value;
  const perVal = document.getElementById('f-period').value;

  // Show/hide rows by data-section attribute
  const rows = document.querySelectorAll('tbody tr');
  rows.forEach(row => {
    const si = parseInt(row.dataset.section);
    if (secVal === 'all' || parseInt(secVal) === si) {
      row.classList.remove('hidden');
    } else {
      row.classList.add('hidden');
    }
  });

  // Dim/show bars based on work type
  const bars = document.querySelectorAll('.bar');
  bars.forEach(bar => {
    const wt = bar.dataset.wt;
    if (wtVal === 'all' || wt === wtVal) {
      bar.classList.remove('dimmed');
    } else {
      bar.classList.add('dimmed');
    }
  });

  // Show/hide period columns
  const prepCols = document.querySelectorAll('[data-period="prep"]');
  const bruddCols = document.querySelectorAll('[data-period="brudd"]');
  const prepHeaders = document.querySelectorAll('.prep-phase-header');
  const bruddHeaders = document.querySelectorAll('.brudd-phase-header');

  if (perVal === 'prep') {
    bruddCols.forEach(el => el.style.display = 'none');
    prepCols.forEach(el => el.style.display = '');
    bruddHeaders.forEach(el => el.style.display = 'none');
    prepHeaders.forEach(el => el.style.display = '');
  } else if (perVal === 'brudd') {
    prepCols.forEach(el => el.style.display = 'none');
    bruddCols.forEach(el => el.style.display = '');
    prepHeaders.forEach(el => el.style.display = 'none');
    bruddHeaders.forEach(el => el.style.display = '');
  } else {
    prepCols.forEach(el => el.style.display = '');
    bruddCols.forEach(el => el.style.display = '');
    prepHeaders.forEach(el => el.style.display = '');
    bruddHeaders.forEach(el => el.style.display = '');
  }
}

function render() {
  const el = document.getElementById('chart');
  let h = '<table>';

  // Thead: phase row
  h += '<thead>';
  h += '<tr>';
  h += '<th class="label-header" rowspan="2">Strekning</th>';
  h += '<th class="phase-header prep-phase-header" colspan="4">Forberedende</th>';
  h += '<th class="phase-header brudd-phase brudd-phase-header" colspan="6"><span class="brudd-tag">STENGT SPOR</span> &nbsp;Stengt spor 3. jul – 13. aug 2028</th>';
  h += '</tr>';

  // Thead: time columns row
  h += '<tr>';
  COLS.forEach(c => {
    const cls = c.brudd ? 'time-header brudd-time' : 'time-header';
    const pCls = c.brudd ? 'brudd-phase-header' : 'prep-phase-header';
    h += `<th class="${cls} ${pCls}" data-period="${c.period}">${c.label}</th>`;
  });
  h += '</tr></thead>';

  // Tbody — rendered in RENDER_ORDER so hele strekning is first row
  h += '<tbody>';
  RENDER_ORDER.forEach(si => {
    const sec = SECTIONS[si];
    h += `<tr data-section="${si}">`;
    h += `<td class="label-cell">${sec.name}<span class="km">${sec.km}</span></td>`;

    COLS.forEach((col, ci) => {
      const acts = DATA.filter(d => d[0] === si && d[1] === col.id);
      const bruddCls = col.brudd ? ' brudd-col' : '';
      const marCls = col.mar ? ' mar-col' : '';
      const pCls = col.brudd ? 'brudd-phase-header' : 'prep-phase-header';

      // Detect if cell needs span bridge classes
      let cellBridgeR = false, cellBridgeL = false, flushR = false, flushL = false;
      acts.forEach(a => {
        const sp = spanPos(a[0], a[1], a[2], a[3]);
        if (sp === 'start' || sp === 'mid') { cellBridgeR = true; flushR = true; }
        if (sp === 'end' || sp === 'mid') { cellBridgeL = true; flushL = true; }
      });
      const tdExtra = (cellBridgeR ? ' span-bridge-r' : '') + (cellBridgeL ? ' span-bridge-l' : '');
      const barsExtra = (flushR ? ' flush-r' : '') + (flushL ? ' flush-l' : '');

      if (acts.length === 0) {
        h += `<td class="${bruddCls}${marCls} ${pCls}" data-period="${col.period}"></td>`;
      } else {
        h += `<td class="${bruddCls}${marCls} ${pCls}${tdExtra}" data-period="${col.period}"><div class="bars${barsExtra}">`;
        acts.forEach(a => {
          const wt = WT[a[2]];
          const txtCls = wt.lightBg ? ' light-bg' : '';
          const sp = spanPos(a[0], a[1], a[2], a[3]);
          const spanCls = sp ? ` span-${sp}` : '';
          h += `<div class="bar${txtCls}${spanCls}" style="background:${wt.color}" title="${a[3]}" data-wt="${a[2]}">${a[3]}</div>`;
          // Dimmed underbar for connected spans
          if (sp) {
            const ubCls = sp === 'start' ? 'span-ub-start' : sp === 'end' ? 'span-ub-end' : '';
            h += `<div class="span-underbar ${ubCls}" style="background:${wt.color}"></div>`;
          }
        });
        h += '</div></td>';
      }
    });
    h += '</tr>';
  });
  h += '</tbody></table>';

  el.innerHTML = h;

  // Legend
  const legend = document.getElementById('legend');
  let lg = '';
  for (const [k, v] of Object.entries(WT)) {
    lg += `<div class="legend-item"><div class="legend-swatch" style="background:${v.color}"></div>${v.label}</div>`;
  }
  lg += '<div class="legend-divider"></div>';
  lg += `<div class="legend-item"><span class="brudd-tag">STENGT SPOR</span> Stengt spor</div>`;
  legend.innerHTML = lg;

  // Note
  document.getElementById('note').innerHTML =
    'Befaringer gjennomføres april 2026 for alle strekninger. ' +
    'Forberedende arbeid (apr–jun 2028) utføres nattarbeid eller spor i drift. ' +
    'Stengt spor: 3. juli – 13. august 2028.';
}

render();
initFilters();
</script>
</body>
</html>
